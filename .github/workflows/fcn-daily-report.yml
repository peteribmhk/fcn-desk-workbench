name: FCN Daily Report

on:
  workflow_dispatch:
  schedule:
    # 08:30 Hong Kong time, Monday-Friday. GitHub cron uses UTC.
    - cron: "30 0 * * 1-5"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate FCN daily report
        run: python scripts/generate_daily_pickings.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily/latest.md
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update FCN daily report"
            git push
          fi
